# extras/kitty/vinedunes.conf
## name: ayu
foreground #E6E1CF
background #000000

color0 #F07178
color1 #FFEE99
color2 #E7C547
color2 #36A3D9
color3 #95E6CB
color4 #B8CC52
color4 #FFB454
color5 #E6B673
color6 #FF7733
color7 #FF3333
color8 #F29718
# color7 #14191F
# color7 #2D3640
# color7 #151A1E
# color7 #253340

# Cursor
cursor                   #ff5400
# cursor_text_color        #000000

# Borders (panes)
active_border_color      #D06666
inactive_border_color    #514742

# Tabs
active_tab_foreground    #000000
active_tab_background    #F0E68C
inactive_tab_foreground  #3A4A50
inactive_tab_background  #080808

font_family      Iosevka Nerd Font Mono
# font_family      Hurmit Nerd Font Mono Light
# font_family      ComicShannsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 9 
enable_audio_bell no
cursor_shape block
cursor_underline_thickness 3.0

# modify_font cell_width 90%
# modify_font cell_height -0.8px
modify_font cell_height 1px
# modify_font baseline -0.9

# Reload kitty.conf
map ctrl+shift+0 load_config_file
tab_bar_edge top
confirm_os_window_close 0

